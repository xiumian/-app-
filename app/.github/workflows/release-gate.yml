name: Pet Companion Release Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    name: Full release gate
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify runtime
        shell: pwsh
        run: |
          node --version
          npm --version

      - name: Run production release gate
        shell: pwsh
        run: npm run ci:check
