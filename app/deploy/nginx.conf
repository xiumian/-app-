server {
  listen 80;
  server_name app.example.com;

  location = /healthz {
    access_log off;
    return 200 "ok
";
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name app.example.com;

  ssl_certificate /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://cdn.example.com; connect-src 'self' https://app.example.com/api https://api.example.com https://monitoring.example.com; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

  location = /healthz {
    access_log off;
    return 200 "ok
";
  }

  location /api/ {
    proxy_pass http://pet-api:8787/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-ID $request_id;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /runtime-config.js {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  location = /service-worker.js {
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }
}
