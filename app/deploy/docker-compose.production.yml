name: pet-companion-production

services:
  pet-api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: pet-companion-api:${APP_VERSION:-0.4.0}
    restart: unless-stopped
    env_file:
      - ./production.env
    environment:
      NODE_ENV: production
      PET_SERVER_HOST: 0.0.0.0
      PET_SERVER_PORT: 8787
      PET_SERVER_DATA_DIR: /data
      PET_STORAGE_DRIVER: sqlite
      PET_SQLITE_FILE: /data/pet-companion.sqlite
      PET_MEDIA_STORAGE_DRIVER: local
      PET_MEDIA_LOCAL_DIR: /data/media
    volumes:
      - pet_companion_data:/data
    expose:
      - "8787"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  pet-web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      pet-api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true

volumes:
  pet_companion_data:
